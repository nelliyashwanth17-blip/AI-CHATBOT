<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Customer Support Chatbot</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#4facfe;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.container{
    width:500px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
.header{
    background:#0077ff;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}
#chat{
    height:350px;
    overflow-y:auto;
    padding:15px;
    background:#f5f5f5;
}
.user{
    text-align:right;
    margin:10px;
}
.bot{
    text-align:left;
    margin:10px;
}
.user span{
    background:#0077ff;
    color:white;
    padding:10px;
    border-radius:10px;
    display:inline-block;
}
.bot span{
    background:#ddd;
    padding:10px;
    border-radius:10px;
    display:inline-block;
}
.footer{
    display:flex;
    padding:10px;
}
input{
    flex:1;
    padding:10px;
}
button{
    padding:10px 20px;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
🤖 AI Customer Support Chatbot
</div>

<div id="chat"></div>

<div class="footer">
<input type="text" id="message" placeholder="Ask me anything...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

let msg=document.getElementById("message").value;

if(msg==="") return;

let chat=document.getElementById("chat");

chat.innerHTML += "<div class='user'><span>"+msg+"</span></div>";

fetch("/get",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:msg
})
})
.then(res=>res.json())
.then(data=>{
chat.innerHTML += "<div class='bot'><span>"+data.response+"</span></div>";
chat.scrollTop=chat.scrollHeight;
});

document.getElementById("message").value="";
}

</script>

</body>
</html>
